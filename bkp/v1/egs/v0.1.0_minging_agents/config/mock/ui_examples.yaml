examples:
  - id: "ecommerce"
    title: "电商客服"
    category: "电商"
    mock_data_file: null
    description: |
      本业务聚焦电商平台客户服务全场景运营，核心工作包含三大模块：
      一是处理订单咨询与售后问题，包括订单状态查询、物流跟踪、退换货处理；
      二是开展促销活动推介与会员权益说明，提升用户复购率；
