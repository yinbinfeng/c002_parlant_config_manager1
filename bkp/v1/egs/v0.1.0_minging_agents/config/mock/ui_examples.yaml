    mock_data_file: "insurance_mock_data.yaml"
    description: |
      共荣保险是一家专注于家庭保障规划的保险公司，本业务聚焦共荣保险的客户营销与留存挽留全场景运营。
      核心工作包含三大模块：
      一是深度挖掘存量及潜在客户的保险保障需求，完成客户画像与需求匹配；
      二是开展合规的保险产品精准推介与营销转化，主推共荣重疾险、共荣医疗险、共荣寿险、共荣年金险等核心产品；
      三是执行全周期客户跟进服务，完成客户留存、续约及二次转化，最终实现客户流失率降低、客户生命周期价值与保费规模双提升的业务目标。

