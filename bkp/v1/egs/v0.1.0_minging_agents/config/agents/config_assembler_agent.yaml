# Config Assembler Agent Configuration
# 负责组装最终的 Parlant Agent 配置文件
# yaml-language-server: $schema=https://json-schema.org/draft/2020-12/schema

agent_name: ConfigAssemblerAgent
base_class: ConfigAssemblerAgent
description: "配置组装师 Agent - 负责组装最终的 Parlant Agent 配置文件"

model:
  type: OpenAIChatModel
  config:
    model_name: Qwen/Qwen3.5-27B
    temperature: 0.7
    max_tokens: 4096

tools:
  - name: deep_research
    description: "深度搜索工具，用于查找 Parlant 配置最佳实践"
  - name: json_validator
    description: "JSON 验证工具，用于验证和保存 JSON 格式数据"

system_prompt_template: |
  你是一名专业的配置组装师，负责组装最终的 Parlant Agent 配置文件。
  
  【Parlant Agent 配置文件说明】
  Parlant Agent 配置文件是用于在 Parlant 平台上部署和运行一个客服 Agent 的完整配置包，包含：
  - **Agent 基础配置**：名称、描述、版本号等基本信息
  - **Journeys（用户旅程）**：定义完整的业务流程和状态机，如「售前咨询流程」、「退换货流程」
  - **Guidelines（指导原则）**：定义 Agent 的行为准则和回复规范，确保符合业务要求
  - **Tools（工具）**：定义 Agent 可调用的外部 API 和函数，如查询订单、创建工单等
  - **Glossary（术语表）**：定义业务领域的专业术语和同义词，确保理解准确
  - **Observations（观测）**：定义用户行为和状态的观测条件，作为 Guideline 的依赖
  - **Profiles（用户画像）**：定义用户分群和个性化服务配置
  - **Canned Responses（模板话术）**：定义标准化的回复模板
  
  该配置文件是生产级客服 Agent 的核心，直接决定了 Agent 的行为模式和服务质量。
  
  主要职责：
  - 收集所有阶段的产出物（需求澄清、多维度分析、工作流开发、全局规则检查）
  - 整合并组装成完整的 Parlant Agent 配置
  - 生成 YAML 和 JSON 两种格式的配置
  - 进行最终验证和完整性检查
  - 提供配置说明和使用指南
  
  校验机制：
  1. **JSON 格式校验**：
     - 使用 json_repair 库检查 JSON 格式
     - 如果格式错误，尝试自动修复
     - 自动修复失败则调用 Agent 进行修正
  
  2. **Schema 校验**：
     - 使用 jsonschema 库验证是否符合 Parlant schema
     - 重点检查必填字段和字段类型
  
  3. **重试机制**：
     - 校验失败时最多重试 3 次
     - 每次重试需记录失败原因和修正方案
  
  4. **验证报告**：
     - 生成 step5_validation_report.md
     - 包含：校验范围、发现的问题、修正历史、最终结论
  
  输出格式：
  - YAML: 适合人工阅读和编辑
  - JSON: 适合程序解析和处理
  - Markdown: 配置说明文档
  
  配置结构：
  - metadata: 配置元数据
  - agent: Agent 基本信息
  - journeys: 用户旅程
  - guidelines: 指导原则
  - tools: 工具集成
  - glossary: 术语表
  - observations: 观测配置
  - profiles: 用户画像
  - canned_responses: 模板话术

output_schema: null

# 任务提示词模板
task_prompts:
  # 配置组装提示词
  assemble_config: |
    ## 业务描述
    {business_desc}
    
    ## 所有阶段的产出物
    ## （包含：需求澄清问题、结构化需求规格、多维度分析报告、原子化任务列表、工作流配置、全局规则配置等）
    {all_step_outputs}
    
    请基于以上信息，生成一个完整的 Parlant Agent 配置，包含：
    1. 元数据（name, version, generated_at, business_description）
    2. Agent 配置（name, description, version）
    3. Journeys（用户旅程）
    4. Guidelines（指导原则）
    5. Tools（工具）
    6. Glossary（术语表）
    7. Observations（观测配置）
    8. Profiles（用户画像）
    9. Canned Responses（模板话术）
    
    【Parlant 配置文件目录结构】
    
    ```
    agents/{agent_name}/
    ├── 00_agent_base/
    │   ├── agent_metadata.json          # Agent 基础信息
    │   ├── agent_observability.json      # Agent 可观测性配置
    │   ├── agent_user_profiles.json      # 用户画像配置（可选）
    │   └── glossary/
    │       └── {business}_terms.json     # 术语表
    ├── 01_agent_rules/
    │   ├── agent_guidelines.json         # 全局 Guideline
    │   ├── agent_observations.json       # 全局 Observation
    │   ├── agent_canned_responses.json   # 模板话术
    │   └── agent_policies.json           # 策略配置（可选）
    ├── 02_journeys/
    │   └── {journey_name}/
    │       ├── sop.json                  # Journey 定义
    │       ├── sop_guidelines.json       # Journey 级别 Guideline
    │       └── sop_observations.json     # Journey 级别 Observation
    └── 03_tools/
        └── {tool_name}/
            ├── __init__.py
            ├── tool_impl.py              # 工具实现
            └── tool_meta.json            # 工具元数据
    ```
    
    【各配置文件字段规范】
    
    ### 1. agent_metadata.json
    ```json
    {
      "agent_id": "{agent_name}_001",
      "agent_name": "{业务}客服 Agent",
      "agent_description": "专业的{业务}客服代理，为用户提供{服务内容}",
      "default_language": "zh-CN",
      "default_priority": 5,
      "conversation_timeout": 3600,
      "playground_port": 8801,
      "remark": "{业务}专属 Agent，完全独立配置"
    }
    ```
    
    ### 2. agent_guidelines.json（全局 Guideline）
    ```json
    {
      "agent_id": "{agent_name}_001",
      "remark": "{业务} Agent 专属全局 Guideline，完整实现 Parlant 原生排除/依赖关系",
      "agent_guidelines": [
        {
          "guideline_id": "{业务前缀}_greet_001",
          "scope": "agent_global",
          "condition": "用户首次对话、向代理打招呼",
          "action": "用友好的语气回应用户，主动询问用户的{业务}需求",
          "priority": 3,
          "composition_mode": "FLUID",
          "bind_canned_response_ids": ["{业务前缀}_cr_greet_001"],
          "exclusions": [],
          "dependencies": []
        }
      ]
    }
    ```
    
    ### 3. agent_observations.json（全局 Observation）
    ```json
    {
      "agent_id": "{agent_name}_001",
      "remark": "{业务} Agent 专属全局观测，作为规则依赖的前置触发条件",
      "agent_observations": [
        {
          "observation_id": "{业务前缀}_obs_user_angry_001",
          "condition": "用户表达不满、愤怒、抱怨，使用负面情绪词汇",
          "remark": "观测用户是否处于负面情绪状态"
        },
        {
          "observation_id": "{业务前缀}_obs_user_requests_human_001",
          "condition": "用户要求转人工、找客服、对自动回复不满意",
          "remark": "观测用户是否有转人工需求"
        }
      ]
    }
    ```
    
    ### 4. glossary/{business}_terms.json
    ```json
    {
      "agent_id": "{agent_name}_001",
      "remark": "{业务} Agent 专属核心术语",
      "terms": [
        {
          "term_id": "{业务前缀}_term_001",
          "name": "术语名称",
          "description": "术语定义",
          "synonyms": ["同义词1", "同义词2"],
          "language": "zh-CN"
        }
      ]
    }
    ```
    
    ### 5. journeys/{journey_name}/sop.json
    ```json
    {
      "sop_id": "{journey_name}_001",
      "sop_title": "{流程标题}全流程 SOP",
      "sop_description": "引导用户完成{流程步骤}的全流程",
      "trigger_conditions": ["触发条件1", "触发条件2"],
      "timeout": 1800,
      "sop_guideline_mapping": {
        "sop_guideline_file": "./sop_guidelines.json",
        "sop_global_bind_guideline_ids": ["{guideline_id}"]
      },
      "sop_states": [
        {
          "state_id": "state_000",
          "state_name": "初始状态",
          "state_type": "chat",
          "instruction": "状态指令",
          "bind_guideline_ids": ["{guideline_id}"],
          "transitions": [
            {
              "target_state_id": "state_001",
              "condition": "转换条件"
            }
          ]
        }
      ]
    }
    ```
    
    ### 6. tools/{tool_name}/tool_meta.json
    ```json
    {
      "tool_id": "{业务前缀}_tool_{功能名}",
      "tool_name": "{功能名}",
      "tool_description": "工具描述",
      "timeout": 5,
      "implementation_file": "./tool_impl.py",
      "use_scenarios": ["使用场景"],
      "input_params": [
        {
          "param_name": "参数名",
          "param_type": "string",
          "required": true,
          "default": "",
          "description": "参数描述"
        }
      ],
      "output_params": [
        {
          "field_name": "字段名",
          "field_type": "string",
          "description": "字段描述"
        }
      ]
    }
    ```
    
    【校验要求】
    1. **JSON 格式校验**：
       - 使用 json_repair 库检查 JSON 格式
       - 如果格式错误，尝试自动修复
       - 自动修复失败则记录问题并继续处理其他文件
    
    2. **Schema 校验**：
       - 使用 jsonschema 库验证是否符合 Parlant schema
       - 重点检查必填字段和字段类型
       - 对于不符合 schema 的文件，记录详细错误信息
    
    3. **完整性检查**：
       - 检查所有必需的配置是否齐全
       - 检查文件引用是否正确（如 journey 引用的 guideline 是否存在）
       - 检查工具调用的输入输出是否匹配
       - 检查 observation 是否被 guideline 正确引用
       - 检查 exclusions 和 dependencies 引用是否有效
    
    4. **一致性检查**：
       - 检查 agent_id 在所有文件中是否一致
       - 检查 ID 命名风格是否一致
       - 检查业务前缀是否统一
    
    【验证报告】
    生成以下验证报告文件：
    - step5_assembly_report.md（组装报告）
    - step5_validation_report.md（验证报告）
    
    验证报告应包含：
    - 数据来源说明（互联网搜索、Data Agent 分析结果）
    - 校验范围和方法
    - 发现的问题及修正历史
    - 最终结论（通过/有条件通过/不通过）
    
    请以 JSON 格式返回，确保符合 Parlant 规范。
