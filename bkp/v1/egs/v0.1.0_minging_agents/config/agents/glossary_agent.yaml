# Glossary Agent Configuration
# 负责词汇体系设计
# yaml-language-server: $schema=https://json-schema.org/draft/2020-12/schema

agent_name: GlossaryAgent
base_class: ReActAgent
description: 词汇体系设计Agent，负责提取和定义专业术语体系

model:
  type: OpenAIChatModel
  config:
    model_name: Qwen/Qwen3.5-27B
    temperature: 0.7

tools:
  - name: deep_research
    description: 深度搜索工具
  - name: json_validator
    description: JSON 校验与修复工具

system_prompt_template: |
  你是一名专业的业务词汇体系设计师，负责根据业务需求提取和定义专业术语体系。
  
  【核心职责】
  - 从业务描述和分析结果中提取专业术语
  - 定义术语的标准含义和使用场景
  - 建立术语之间的关联关系
  
  【输出格式】
  输出必须直接是 JSON 数据，不允许输出模板化讲解文本、Markdown 标题或"示例说明"段落。

output_schema: ParlantGlossarySchema

task_prompts:
  design_glossary: |
    【核心目标 - 必须遵守】
    {core_goal}
    
    【任务】
    请根据以下业务描述，提取并定义业务专业术语体系。
    
    【强制要求 - 执行前必读】
    1. **第一步必须使用 Deep Research**：
       调用 deep_research 工具搜索与业务相关的专业术语：
       - "{industry} 行业专业术语表 标准定义"
       - "{industry} 产品设计常用术语"
       - "{industry} 服务专业词汇"
    
    2. **主题约束检查清单**：
       - 所有术语必须与业务描述相关
       - 必须包含产品术语、业务术语
       - 禁止出现与业务无关的术语
    
    ## 业务描述
    {business_desc}
    
    ## 原子化任务列表
    {step2_atomic_tasks}
    
    ## 结构化需求规格说明
    {step1_structured_requirements}
    
    【Parlant Glossary 配置说明】
    
    ### 1. Glossary 核心原则
    
    - **业务相关性**：术语必须与业务场景紧密相关，避免通用术语
    - **定义精确性**：每个术语的定义必须清晰、准确、无歧义
    - **同义词覆盖**：为常用术语提供同义词，提高意图识别准确率
    - **语言一致性**：所有术语使用统一语言（如 zh-CN）
    
    ### 2. Glossary 字段规范
    
    | 字段名 | 类型 | 必填 | 说明 |
    |--------|------|------|------|
    | term_id | string | 是 | 术语唯一标识，格式：`{业务前缀}_term_{序号}`，如 `airline_term_001` |
    | name | string | 是 | 术语名称（简洁明确） |
    | description | string | 是 | 术语定义（清晰准确，说明业务含义） |
    | synonyms | array | 否 | 同义词列表（提高意图识别准确率） |
    | language | string | 是 | 语言代码，如 `zh-CN`、`en-US` |
    
    ### 3. 术语分类原则
    
    1. **产品术语**：与产品类型和特性相关
       - 示例：经济舱、商务舱、头等舱（航空业务）
       - 示例：定期寿险、终身寿险、健康险（保险业务）
    
    2. **业务术语**：与业务流程和操作相关
       - 示例：预订、退票、改签（航空业务）
       - 示例：投保、理赔、续保（保险业务）
    
    3. **法规术语**：与法律法规相关（如适用）
       - 示例：实名制、行程单、电子客票（航空业务）
       - 示例：等待期、免责条款、保险金额（保险业务）
    
    4. **服务术语**：与客户服务流程相关
       - 示例：值机、登机、行李托运（航空业务）
       - 示例：核保、理赔申请、保单查询（保险业务）
    
    ### 4. 术语设计最佳实践
    
    1. **避免过度泛化**：
       - 错误：定义"机票"为"一种票据"
       - 正确：定义"机票"为"航空公司签发的乘机凭证，包含航班号、日期、座位等级信息"
    
    2. **同义词设计原则**：
       - 只添加用户实际会使用的同义词
       - 避免添加过于生僻的同义词
       - 同义词之间不应有包含关系
    
    3. **术语覆盖范围**：
       - 覆盖核心业务流程中的所有关键术语
       - 覆盖用户高频使用的表达方式
       - 覆盖容易产生歧义的术语
    
    ### 5. 术语与 Agent 行为的关系
    
    - **意图识别**：术语表帮助 Agent 准确理解用户意图
    - **回复准确性**：术语定义确保 Agent 使用正确的表达
    - **同义词匹配**：同义词列表提高意图识别的召回率
    
    【输出格式 - 必须严格遵守】
    请返回符合 Parlant 规范的 JSON 对象：
    ```json
    {
      "agent_id": "{agent_name}_001",
      "remark": "{业务} Agent 专属核心术语，确保 Agent 精准理解{业务}相关表述",
      "terms": [
        {
          "term_id": "{业务前缀}_term_001",
          "name": "术语名称",
          "description": "术语定义，清晰准确说明业务含义",
          "synonyms": ["同义词1", "同义词2"],
          "language": "zh-CN"
        },
        {
          "term_id": "{业务前缀}_term_002",
          "name": "经济舱",
          "description": "飞机上的标准舱位等级，票价相对较低，座位间距适中，提供基础餐饮服务",
          "synonyms": ["普通舱", "标准舱"],
          "language": "zh-CN"
        },
        {
          "term_id": "{业务前缀}_term_003",
          "name": "商务舱",
          "description": "飞机上的高端舱位等级，票价高于经济舱，座位更宽敞舒适，提供优先登机和优质餐饮服务",
          "synonyms": ["公务舱", "豪华舱"],
          "language": "zh-CN"
        },
        {
          "term_id": "{业务前缀}_term_004",
          "name": "直飞航班",
          "description": "从出发地直接飞往目的地，中途不转机或仅经停但不换飞机的航班",
          "synonyms": ["直达航班", "不经停航班"],
          "language": "zh-CN"
        }
      ]
    }
    ```
    
    【自检清单】
    - [ ] 所有术语是否与核心目标相关？
    - [ ] 是否使用了 Deep Research？
    - [ ] 是否包含产品、业务、服务术语？
    - [ ] 术语定义是否清晰准确？
    - [ ] 同义词是否合理有效？
    - [ ] term_id 命名是否符合规范？
